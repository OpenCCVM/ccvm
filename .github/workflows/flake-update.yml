name: flake update

# Weekly `nix flake update` (bumps the nixpkgs lock) → opens a PR for MANUAL review/merge.
# Deliberately does NOT auto-merge (unlike the sibling repos): flake check builds + runs the
# host tests but does NOT boot a VM (tests/boot.sh isn't in CI), so a green check can't catch a
# nixpkgs bump that breaks guest boot/runtime — and ccvm's `main` is what users `nix run`. A
# human merges after eyeballing the bump (and, ideally, a local boot.sh). Revisit auto-merge
# once there's a KVM runner gating the merge on boot.sh.

on:
  schedule:
    - cron: '0 6 * * 1' # Monday 6 AM UTC
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    # Least privilege: GITHUB_TOKEN is used only by checkout (read). The branch push + PR
    # creation use a GitHub App installation token (below), not GITHUB_TOKEN.
    permissions:
      contents: read
    steps:
      # Mint a short-lived (~1h) GitHub App installation token — used instead of GITHUB_TOKEN so
      # the bot's PR actually triggers `check` (PRs opened by GITHUB_TOKEN don't), and instead of
      # a PAT so there's no token expiry to silently break the weekly run and no tie to a personal
      # account (the PR comes from the org App's identity). Needs repo variable APP_ID + secret
      # APP_PRIVATE_KEY; App permissions: Contents RW + Pull requests RW, installed on this repo.
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6.0.2 (Jan 2026)
      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22 (Mar 2026)
      - name: nix flake update
        run: nix flake update
      - name: create pull request
        id: cpr
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1 (Apr 2026)
        with:
          token: ${{ steps.app-token.outputs.token }}
          commit-message: "flake: update inputs"
          title: "flake: update inputs"
          branch: flake-update/auto
          delete-branch: true
          body: |
            Automated `nix flake update` via CI. **Merge manually** after review — ideally a
            local `bash tests/boot.sh` pass, since CI's `flake check` does not boot a VM.
            Generated by GitHub Actions.
